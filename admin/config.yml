backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://fluent-minds.netlify.app
display_url: https://fluent-minds.netlify.app

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Techniques", value: "techniques" }
          - { label: "Daily Life", value: "daily" }
          - { label: "Research", value: "research" }
          - { label: "Confidence", value: "confidence" }
          - { label: "Mental Health", value: "mental" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Author", name: "author", widget: "string", default: "Fluent Minds" }
      - { label: "Read Time (min)", name: "readTime", widget: "number", default: 5 }
      - { label: "Featured?", name: "featured", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
